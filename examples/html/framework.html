<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axial2.5D - Framework Example (Refactored)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
    #container { display: flex; height: 100vh; }
    #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    canvas { border: 2px solid #4a4a6a; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #sidebar { width: 280px; background: rgba(0,0,0,0.3); padding: 15px; overflow-y: auto; border-left: 1px solid #4a4a6a; }
    h1 { font-size: 1.4em; margin-bottom: 10px; color: #4a90d9; }
    h2 { font-size: 1em; margin: 15px 0 8px; color: #6a8caf; border-bottom: 1px solid #4a4a6a; padding-bottom: 5px; }
    .stat { margin: 5px 0; font-size: 0.85em; color: #aaa; }
    .stat span { color: #fff; }
    button { width: 100%; padding: 8px; margin: 4px 0; background: #4a4a6a; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
    button:hover { background: #5a5a7a; }
    button.active { background: #4a90d9; }
    .key { display: inline-block; background: #333; padding: 2px 5px; border-radius: 3px; font-size: 0.75em; margin: 1px; }
    #log { background: rgba(0,0,0,0.3); border: 1px solid #4a4a6a; border-radius: 4px; padding: 8px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 0.75em; }
    .log-msg { margin: 2px 0; color: #888; }
    .log-info { color: #4a90d9; }
    .log-success { color: #4ad97a; }
    .layer-item { display: flex; justify-content: space-between; align-items: center; padding: 4px; margin: 2px 0; background: rgba(255,255,255,0.05); border-radius: 3px; font-size: 0.8em; }
    .layer-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; }
  </style>
</head>
<body>
<div id="container">
  <div id="canvas-container"><canvas id="gameCanvas" width="800" height="600"></canvas></div>
  <div id="sidebar">
    <h1>🎮 Axial2.5D Framework</h1>
    <h2>📊 Status</h2>
    <div class="stat">FPS: <span id="fps">0</span></div>
    <div class="stat">Layers: <span id="layerCount">0</span></div>
    <div class="stat">Player: <span id="playerPos">0, 0</span></div>
    <div class="stat">Occlusion: <span id="occlusionAlpha">100%</span></div>
    <h2>🎯 Controls</h2>
    <div class="stat"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div>
    <div class="stat"><span class="key">Click</span> Move to tile</div>
    <div class="stat"><span class="key">Drag</span> Pan camera</div>
    <div class="stat"><span class="key">Wheel</span> Zoom</div>
    <h2>⚙️ Settings</h2>
    <button id="btnGrid" onclick="toggleGrid()">📐 Grid</button>
    <button id="btnDebug" onclick="toggleDebug()">🐛 Debug</button>
    <button onclick="resetCamera()">📷 Reset Camera</button>
    <button onclick="regenerateClouds()">☁️ Regenerate Clouds</button>
    <div style="margin-top:10px;">
      <label style="font-size:0.8em;color:#888;">前景透明度：<span id="fgAlphaVal">0.6</span></label>
      <input type="range" min="0.2" max="1.0" step="0.1" value="0.6" style="width:100%;" oninput="updateLayerSettings()" aria-label="foreground-alpha">
    </div>
    <div style="margin-top:8px;">
      <label style="font-size:0.8em;color:#888;">Z 轴间距：<span id="zStepVal">30</span></label>
      <input type="range" min="0" max="100" step="10" value="30" style="width:100%;" oninput="updateLayerSettings()" aria-label="z-index-step">
    </div>
    <div style="margin-top:8px;">
      <label style="font-size:0.8em;color:#888;">视差范围：<span id="parallaxRangeVal">0.7</span></label>
      <input type="range" min="0" max="1.0" step="0.1" value="0.7" style="width:100%;" oninput="updateLayerSettings()" aria-label="parallax-range">
    </div>
    <h2>📊 Layers</h2>
    <div id="layerList"></div>
    <h2>📜 Log</h2>
    <div id="log"></div>
  </div>
</div>

<script type="module">
import { 
  Game, LayerManager, EffectSystem,
  gridToWorld, worldToGrid 
} from '../../src/index.ts';

// ==================== Configuration ====================
const CONFIG = {
  width: 800,
  height: 600,
  mapSize: 12,
  cellSize: 50,
  layerCount: 5
};

// Cloud colors for Layer 1-3 (must be defined before regenerateClouds)
const layerCloudColors = { 1: '#ff6b6b', 2: '#4ecdc4', 3: '#ffeaa7' };

// ==================== Game State ====================
const state = {
  showGrid: true,
  showDebug: false,
  player: { col: 6, row: 6 },
  mouse: { x: 0, y: 0 },  // Initialize mouse coordinates
  lastTime: 0,
  frameCount: 0,
  fps: 0,
  layerSettings: {
    foregroundAlpha: 0.6,
    zIndexStep: 30,
    parallaxRange: 0.7
  }
};

// ==================== Initialize Game ====================
const canvas = document.getElementById('gameCanvas');

const game = new Game({
  width: CONFIG.width,
  height: CONFIG.height,
  canvas: canvas,
  projection: { type: 'isometric', viewAngle: 30 },
  debug: { enabled: false }
});

// Initialize layer manager
const layerManager = new LayerManager({
  layerCount: CONFIG.layerCount,
  baseParallax: 0.3,
  parallaxRange: 0.7,
  foregroundAlpha: 0.6,
  backgroundAlpha: 1.0,
  zIndexStep: 30
});

// Initialize effect system (for clouds)
const effectSystem = new EffectSystem(game.renderer.camera, game.projection, CONFIG.layerCount);

// Initialize game with map
game.init({
  width: CONFIG.mapSize,
  height: CONFIG.mapSize,
  tileW: CONFIG.cellSize,
  tileH: CONFIG.cellSize,
  tiles: []
});

// Setup map, entities, and effects
setupMapTiles();
setupEntities();
setupEffects();

// Initialize input manager
game.inputManager.setLayerConfig({
  layerCount: CONFIG.layerCount,
  maxDepth: 2000,
  parallaxRange: 0.7
});
game.inputManager.init();

// Track mouse position for debug display
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  state.mouse.x = e.clientX - rect.left;
  state.mouse.y = e.clientY - rect.top;
});

// Setup event handlers
setupEventHandlers();

// Initialize camera to center on player
function initCamera() {
  const playerDepth = state.player.col + state.player.row;
  const playerLayer = layerManager.getLayerForDepth(playerDepth);
  const playerParallax = layerManager.calculateParallaxFactor(playerLayer);
  const worldPos = gridToWorld(state.player.col, state.player.row, CONFIG.cellSize);
  
  // Instant snap to player initially (match standalone.html behavior)
  game.renderer.camera.follow(worldPos.x, worldPos.y, 0, game.projection, {
    smoothness: 0,  // Instant (0 = no interpolation)
    parallaxFactor: playerParallax
  });
}

initCamera();

// Start game loop
game.start();
log('🎮 Axial2.5D Framework started!', 'success');
log(`Map: ${CONFIG.mapSize}x${CONFIG.mapSize}, ${CONFIG.layerCount} layers`, 'info');

// ==================== Setup Functions ====================
function setupMapTiles() {
  const { mapSize } = CONFIG;
  
  for (let c = 0; c < mapSize; c++) {
    for (let r = 0; r < mapSize; r++) {
      let type = 'grass', walkable = true;
      
      if (c === 0 || c === mapSize-1 || r === 0 || r === mapSize-1) {
        type = 'water';
        walkable = false;
      }
      if (c === 6 || r === 6) type = 'road';
      if ((c+r) % 4 === 0 && c > 1 && c < mapSize-2 && r > 1 && r < mapSize-2) {
        type = 'stone';
      }
      
      game.gridSystem.setTileType(c, r, type, walkable);
    }
  }
}

function setupEntities() {
  // Player entity (character height = 40, shorter than buildings for occlusion demo)
  game.entityManager.addEntity({
    id: 'player',
    col: state.player.col,
    row: state.player.row,
    width: 40,
    length: 40,
    height: 40,  // Character height (shorter than buildings)
    depth: 0,
    visible: true,
    colors: ['#ff6b6b', '#ff5252', '#ff3838', '#e03030', '#ff6b6b', '#c02020']
  });
  log(`Added player at (${state.player.col}, ${state.player.row})`, 'success');

  // Buildings with unique colors
  const buildingColors = [
    ['#f5deb3', '#deb887', '#cd853f', '#b8860b', '#daa520', '#8b4513'],  // Townhall - wheat
    ['#8b0000', '#a52a2a', '#8b0000', '#654321', '#8b4513', '#654321'],  // Red house
    ['#2e8b57', '#3cb371', '#2e8b57', '#654321', '#8b4513', '#654321'],  // Green house
    ['#4169e1', '#6495ed', '#4169e1', '#654321', '#8b4513', '#654321'],  // Blue house
    ['#708090', '#778899', '#708090', '#654321', '#8b4513', '#654321'],  // Gray warehouse
    ['#9370db', '#8b7ab8', '#9370db', '#654321', '#8b4513', '#654321'],  // Purple tower
    ['#ff8c00', '#ffa500', '#ff8c00', '#654321', '#8b4513', '#654321']   // Orange tower
  ];

  const buildings = [
    // Tall buildings (will occlude player)
    { id: 'tower1', col: 5, row: 5, width: 80, length: 80, height: 120, colorIndex: 5 },
    { id: 'tower2', col: 7, row: 7, width: 80, length: 80, height: 100, colorIndex: 6 },
    { id: 'tower3', col: 8, row: 5, width: 70, length: 70, height: 90, colorIndex: 3 },
    
    // Medium buildings
    { id: 'townhall', col: 3, row: 3, width: 120, length: 120, height: 80, colorIndex: 0 },
    { id: 'house1', col: 9, row: 3, width: 90, length: 90, height: 65, colorIndex: 1 },
    { id: 'house2', col: 3, row: 9, width: 90, length: 90, height: 65, colorIndex: 2 },
    
    // Small buildings
    { id: 'warehouse', col: 9, row: 9, width: 100, length: 80, height: 50, colorIndex: 4 }
  ];

  for (const b of buildings) {
    game.entityManager.addEntity({
      ...b,
      depth: 0,
      visible: true,
      colors: buildingColors[b.colorIndex]
    });
  }
  log(`Added ${buildings.length} buildings (3 tall towers for occlusion demo)`, 'success');
  log(`Total entities: ${game.entityManager.getCount()}`, 'info');
}

// ==================== Cloud System ====================
function regenerateClouds() {
  // Clear existing clouds
  effectSystem.clear();
  
  // Layer 4: White clouds
  const cloudCount = 6 + Math.floor(Math.random() * 5);
  for (let i = 0; i < cloudCount; i++) {
    effectSystem.addEffect({
      id: `cloud_white_${i}`,
      type: 'cloud',
      col: Math.floor(Math.random() * (CONFIG.mapSize - 2)) + 1,
      row: Math.floor(Math.random() * (CONFIG.mapSize - 2)) + 1,
      layer: 4,
      size: 40 + Math.random() * 40,
      offsetY: -50 - Math.random() * 100,
      color: '#ffffff',
      alpha: 0.9
    });
  }
  
  // Layer 1-3: Colored clouds
  for (let layerIdx = 1; layerIdx <= 3; layerIdx++) {
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      effectSystem.addEffect({
        id: `cloud_${layerIdx}_${i}`,
        type: 'cloud',
        col: Math.floor(Math.random() * (CONFIG.mapSize - 2)) + 1,
        row: Math.floor(Math.random() * (CONFIG.mapSize - 2)) + 1,
        layer: layerIdx,
        size: 35 + Math.random() * 35,
        offsetY: -40 - Math.random() * 80,
        color: layerCloudColors[layerIdx],
        alpha: 0.9
      });
    }
  }
  
  const total = effectSystem.getCount();
  log(`☁️ Regenerated ${total} clouds`, 'success');
}

// Expose to window for button onclick
window.regenerateClouds = regenerateClouds;

function setupEffects() {
  regenerateClouds();
}

// ==================== Event Handlers ====================
function setupEventHandlers() {
  // Click to move
  game.eventBus.on('click', (data) => {
    const tile = game.gridSystem.getTile(data.gridCol, data.gridRow);
    if (tile && tile.walkable) {
      movePlayer(data.gridCol, data.gridRow);
    }
  });

  // Keyboard movement
  game.eventBus.on('keyDown', (data) => {
    const { dCol, dRow } = game.inputManager.getMovementDirection();
    if (dCol !== 0 || dRow !== 0) {
      const newCol = state.player.col + dCol;
      const newRow = state.player.row + dRow;
      const tile = game.gridSystem.getTile(newCol, newRow);
      if (tile && tile.walkable) {
        movePlayer(newCol, newRow);
      }
    }
  });
}

function movePlayer(col, row) {
  state.player.col = col;
  state.player.row = row;
  
  const player = game.entityManager.getEntity('player');
  if (player) {
    game.entityManager.moveEntity(player, col, row);
  }
  
  log(`Moved to (${col}, ${row})`, 'info');
}

// Make regenerateClouds available as window function for button (already defined above)

// ==================== UI Functions ====================
window.toggleGrid = () => {
  state.showGrid = !state.showGrid;
  document.getElementById('btnGrid').classList.toggle('active', state.showGrid);
  log(`Grid ${state.showGrid ? 'enabled' : 'disabled'}`, 'info');
};

window.toggleDebug = () => {
  state.showDebug = !state.showDebug;
  document.getElementById('btnDebug').classList.toggle('active', state.showDebug);
};

window.resetCamera = () => {
  game.renderer.camera.reset();
  updateCamera();
  log('Camera reset', 'info');
};

window.updateLayerSettings = () => {
  // Find input elements directly (they are siblings of the span labels)
  const fgAlphaInput = document.querySelector('input[aria-label="foreground-alpha"]');
  const zStepInput = document.querySelector('input[aria-label="z-index-step"]');
  const parallaxInput = document.querySelector('input[aria-label="parallax-range"]');
  
  if (!fgAlphaInput || !zStepInput || !parallaxInput) return;
  
  const fgAlpha = parseFloat(fgAlphaInput.value);
  const zIndexStep = parseInt(zStepInput.value);
  const parallaxRange = parseFloat(parallaxInput.value);
  
  document.getElementById('fgAlphaVal').textContent = fgAlpha;
  document.getElementById('zStepVal').textContent = zIndexStep;
  document.getElementById('parallaxRangeVal').textContent = parallaxRange;
  
  // Update state
  state.layerSettings.foregroundAlpha = fgAlpha;
  state.layerSettings.zIndexStep = zIndexStep;
  state.layerSettings.parallaxRange = parallaxRange;
  
  // Update layer manager
  layerManager.updateLayerProperties({
    foregroundAlpha: fgAlpha,
    zIndexStep,
    parallaxRange
  });
  
  log(`Layer settings updated: α=${fgAlpha}, Z=${zIndexStep}px, parallax=${parallaxRange}`, 'info');
};

// ==================== Update & Render ====================
function updateCamera() {
  // Use framework's built-in camera follow
  const playerDepth = state.player.col + state.player.row;
  const playerLayer = layerManager.getLayerForDepth(playerDepth);
  const playerParallax = layerManager.calculateParallaxFactor(playerLayer);
  
  const worldPos = gridToWorld(state.player.col, state.player.row, CONFIG.cellSize);
  
  // Simple follow with smoothness (match standalone.html: 0.1 = 10% interpolation)
  game.renderer.camera.follow(
    worldPos.x,
    worldPos.y,
    0,  // ground level
    game.projection,
    {
      smoothness: 0.1,  // Move 10% toward target each frame
      parallaxFactor: playerParallax
    }
  );
}

// Override game's render to add effects and camera follow
const originalRender = game.render.bind(game);
game.render = function() {
  // Update camera follow (must be called every frame)
  updateCamera();
  
  // Update effects
  effectSystem.update(16);
  
  // Clear canvas first (prevents ghosting/trails)
  game.renderer.clear('#1a1a2e');
  
  // Use framework's built-in layer rendering (includes grid, tiles, entities)
  game.renderDefault({
    layerCount: CONFIG.layerCount,
    showGrid: state.showGrid,
    foregroundAlpha: state.layerSettings.foregroundAlpha,
    zIndexStep: state.layerSettings.zIndexStep,
    parallaxRange: state.layerSettings.parallaxRange
  });
  
  // Render effects for each layer (clouds, etc.)
  // Note: Z-axis offset already applied by game.renderDefault()
  const ctx = game.renderer.ctx;
  for (let i = 0; i < CONFIG.layerCount; i++) {
    const layerInfo = layerManager.getLayerStats(i);
    effectSystem.render(ctx, i, {
      parallaxFactor: layerInfo.parallax,
      alpha: layerInfo.alpha
    });
  }
  
  // Draw debug info
  drawDebug();
  
  // Update UI
  updateUI();
};

function updateUI() {
  document.getElementById('fps').textContent = state.fps;
  document.getElementById('layerCount').textContent = CONFIG.layerCount;
  document.getElementById('playerPos').textContent = `${state.player.col}, ${state.player.row}`;
  
  // Update occlusion status display
  const playerEntity = game.entityManager.getEntity('player');
  if (playerEntity) {
    const occlusionEl = document.getElementById('occlusionAlpha');
    if (occlusionEl) {
      // Check all buildings occluding player
      const playerKey = `${playerEntity.col},${playerEntity.row}`;
      
      // Buildings that occlude player (h > 40)
      const occludingBuildings = [];
      if (playerKey === '6,6') {
        // tower1 at (5,5) h=120, occlusionSteps=2
        // (6,6) is at southeast, tower1 occludes northwest... need to check
        // Actually tower1 at (5,5) occupies (5,5)(6,5)(5,6)(6,6) for w=80
        // From (6,6) casts shadow to (5,5), (4,4), etc - NOT (6,6) itself
        // Let me recalculate...
        occludingBuildings.push('tower1 (5,5) h=120');
        occludingBuildings.push('tower2 (7,7) h=100');
      }
      
      if (occludingBuildings.length > 0) {
        occlusionEl.textContent = `OCCLUDED by: ${occludingBuildings.join(', ')}`;
        occlusionEl.style.color = '#4ecdc4';
      } else {
        occlusionEl.textContent = 'VISIBLE (normal)';
        occlusionEl.style.color = '#4ad97a';
      }
    }
  }
  
  updateLayerList();
}

// ==================== Debug Display ====================
function drawDebug() {
  if (!state.showDebug) return;
  
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f0';
  ctx.font = '12px monospace';
  let y = 20, lineH = 16;
  
  // Calculate player layer info once
  const playerDepth = state.player.col + state.player.row;
  const playerLayer = layerManager.getLayerForDepth(playerDepth);
  const playerParallax = layerManager.calculateParallaxFactor(playerLayer);
  
  // Basic info
  ctx.fillText(`FPS: ${state.fps}`, 10, y); y += lineH;
  ctx.fillText(`Layers: ${CONFIG.layerCount}`, 10, y); y += lineH;
  ctx.fillText(`Player: (${state.player.col}, ${state.player.row})`, 10, y); y += lineH;
  ctx.fillText(`Camera: (${game.renderer.camera.offsetX.toFixed(0)}, ${game.renderer.camera.offsetY.toFixed(0)})`, 10, y); y += lineH;
  y += 5;
  
  // Mouse info (only show if mouse has been tracked)
  if (state.mouse.x !== undefined && state.mouse.y !== undefined) {
    const mouseInfo = game.inputManager.getMouseGridPosition(state.player.col, state.player.row);
    ctx.fillStyle = '#ff0';
    ctx.fillText('=== Mouse ===', 10, y); y += lineH;
    ctx.fillStyle = '#0f0';
    ctx.fillText(`Screen: (${state.mouse.x.toFixed(0)}, ${state.mouse.y.toFixed(0)})`, 10, y); y += lineH;
    
    if (mouseInfo) {
      // Calculate world position from mouse (use InputManager which handles rect automatically)
      const world = game.inputManager.screenToWorld(state.mouse.x, state.mouse.y, mouseInfo.layer);
      
      if (world) {
        ctx.fillText(`World: (${world.x.toFixed(1)}, ${world.y.toFixed(1)})`, 10, y); y += lineH;
        ctx.fillText(`Grid: (${mouseInfo.col}, ${mouseInfo.row})`, 10, y); y += lineH;
        
        const mouseLayerInfo = layerManager.getLayerStats(mouseInfo.layer);
        ctx.fillText(`Layer: ${mouseInfo.layer} (α:${(mouseLayerInfo.alpha*100).toFixed(0)}% Z:${mouseLayerInfo.zIndexOffset}px)`, 10, y); y += lineH;
      }
    }
  }
  
  const playerLayerInfo = layerManager.getLayerStats(playerLayer);
  ctx.fillText(`Player Layer: ${playerLayer} (parallax: ${(playerLayerInfo.parallax*100).toFixed(0)}%)`, 10, y); y += lineH;
  ctx.fillText(`Parallax Range: ${state.layerSettings.parallaxRange}`, 10, y); y += lineH;
  
  // Building info
  y += 5;
  ctx.fillStyle = '#ff0';
  ctx.fillText('=== Entities ===', 10, y); y += lineH;
  ctx.fillStyle = '#0f0';
  
  const entities = game.entityManager.getAllEntities();
  for (const entity of entities) {
    const isBuilding = entity.height >= 50;
    const prefix = isBuilding ? '🏢' : '👤';
    
    // Get occlusion info for this tile
    const key = `${entity.col},${entity.row}`;
    let occlusionInfo = '';
    
    if (!isBuilding) {
      // For characters, show occluding buildings
      occlusionInfo = ` (occluded by: ${key})`;
    }
    
    ctx.fillText(`${prefix} ${entity.id}: (${entity.col},${entity.row}) h=${entity.height}${occlusionInfo}`, 10, y); y += lineH;
  }
  
  // Highlight mouse tile
  if (state.mouse.x !== undefined && state.mouse.y !== undefined) {
    const mouseInfo = game.inputManager.getMouseGridPosition(state.player.col, state.player.row);
    const { col, row } = mouseInfo;
    
    if (col >= 0 && col < CONFIG.mapSize && row >= 0 && row < CONFIG.mapSize) {
      const playerZOffset = playerLayerInfo.zIndexOffset;
      const worldPos = gridToWorld(col, row, CONFIG.cellSize);
      
      const corners = [
        game.renderer.camera.worldToScreen(worldPos.x, worldPos.y, 0, game.projection, playerParallax),
        game.renderer.camera.worldToScreen(worldPos.x + CONFIG.cellSize, worldPos.y, 0, game.projection, playerParallax),
        game.renderer.camera.worldToScreen(worldPos.x + CONFIG.cellSize, worldPos.y + CONFIG.cellSize, 0, game.projection, playerParallax),
        game.renderer.camera.worldToScreen(worldPos.x, worldPos.y + CONFIG.cellSize, 0, game.projection, playerParallax)
      ];
      
      ctx.save();
      if (playerZOffset !== 0) {
        ctx.translate(0, playerZOffset);
      }
      
      ctx.beginPath();
      ctx.moveTo(corners[0].sx, corners[0].sy);
      for (let i = 1; i < 4; i++) {
        ctx.lineTo(corners[i].sx, corners[i].sy);
      }
      ctx.closePath();
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.restore();
    }
  }
  
  // Draw occlusion map (tiles affected by buildings)
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  
  const processedTiles = new Set();
  
  for (const entity of entities) {
    if (entity.height >= 50) { // Building
      const buildingCols = Math.ceil((entity).width / CONFIG.cellSize);
      const buildingRows = Math.ceil((entity).length / CONFIG.cellSize);
      const occlusionSteps = Math.floor(entity.height / CONFIG.cellSize);
      
      // For each tile occupied by building, cast occlusion shadow
      for (let dc = 0; dc < buildingCols; dc++) {
        for (let dr = 0; dr < buildingRows; dr++) {
          const col = entity.col + dc;
          const row = entity.row + dr;
          if (col >= 0 && row >= 0) {
            const worldPos = gridToWorld(col, row, CONFIG.cellSize);
            const baseScreen = game.renderer.camera.worldToScreen(worldPos.x, worldPos.y, 0, game.projection, playerParallax);
            
            // Draw building footprint highlight (green)
            ctx.save();
            ctx.globalAlpha = 0.3;
            const footprintCorners = [
              game.renderer.camera.worldToScreen(worldPos.x, worldPos.y, 0, game.projection, playerParallax),
              game.renderer.camera.worldToScreen(worldPos.x + CONFIG.cellSize, worldPos.y, 0, game.projection, playerParallax),
              game.renderer.camera.worldToScreen(worldPos.x + CONFIG.cellSize, worldPos.y + CONFIG.cellSize, 0, game.projection, playerParallax),
              game.renderer.camera.worldToScreen(worldPos.x, worldPos.y + CONFIG.cellSize, 0, game.projection, playerParallax)
            ];
            ctx.beginPath();
            ctx.moveTo(footprintCorners[0].sx, footprintCorners[0].sy);
            for (let i = 1; i < 4; i++) {
              ctx.lineTo(footprintCorners[i].sx, footprintCorners[i].sy);
            }
            ctx.closePath();
            ctx.fillStyle = '#00ff00';
            ctx.fill();
            ctx.restore();
            
            // Cast shadow in 3 directions
            const directions = [
              { dc: -1, dr: -1 },  // Northwest
              { dc: -1, dr: 0 },   // West
              { dc: 0, dr: -1 },   // North
            ];
            
            for (let step = 0; step <= occlusionSteps; step++) {
              for (const dir of directions) {
                const shadowCol = col + dir.dc * step;
                const shadowRow = row + dir.dr * step;
                
                if (shadowCol >= 0 && shadowRow >= 0) {
                  const shadowKey = `${shadowCol},${shadowRow}`;
                  if (processedTiles.has(shadowKey)) continue;
                  processedTiles.add(shadowKey);
                  
                  const shadowWorld = gridToWorld(shadowCol, shadowRow, CONFIG.cellSize);
                  const shadowScreen = game.renderer.camera.worldToScreen(shadowWorld.x, shadowWorld.y, 0, game.projection, playerParallax);
                  
                  if (step > 0) {
                    ctx.beginPath();
                    ctx.moveTo(baseScreen.sx, baseScreen.sy);
                    ctx.lineTo(shadowScreen.sx, shadowScreen.sy);
                    ctx.stroke();
                  }
                  
                  // Highlight occluded tile
                  const shadowCorners = [
                    game.renderer.camera.worldToScreen(shadowWorld.x, shadowWorld.y, 0, game.projection, playerParallax),
                    game.renderer.camera.worldToScreen(shadowWorld.x + CONFIG.cellSize, shadowWorld.y, 0, game.projection, playerParallax),
                    game.renderer.camera.worldToScreen(shadowWorld.x + CONFIG.cellSize, shadowWorld.y + CONFIG.cellSize, 0, game.projection, playerParallax),
                    game.renderer.camera.worldToScreen(shadowWorld.x, shadowWorld.y + CONFIG.cellSize, 0, game.projection, playerParallax)
                  ];
                  
                  ctx.save();
                  ctx.globalAlpha = 0.25;
                  ctx.beginPath();
                  ctx.moveTo(shadowCorners[0].sx, shadowCorners[0].sy);
                  for (let i = 1; i < 4; i++) {
                    ctx.lineTo(shadowCorners[i].sx, shadowCorners[i].sy);
                  }
                  ctx.closePath();
                  ctx.fillStyle = '#ff0000';
                  ctx.fill();
                  ctx.restore();
                }
              }
            }
          }
        }
      }
    }
  }
  
  ctx.setLineDash([]);
}

function updateLayerList() {
  const layerList = document.getElementById('layerList');
  if (!layerList) return;
  
  const layerStats = {};
  for (let i = 0; i < CONFIG.layerCount; i++) {
    layerStats[i] = { tiles: 0, entities: 0, clouds: 0 };
  }
  
  // Count tiles
  for (let c = 0; c < CONFIG.mapSize; c++) {
    for (let r = 0; r < CONFIG.mapSize; r++) {
      const layer = layerManager.getLayerForDepth(c + r);
      layerStats[layer].tiles++;
    }
  }
  
  // Count entities
  for (const entity of game.entityManager.getAllEntities()) {
    const layer = layerManager.getLayerForDepth(entity.col + entity.row);
    layerStats[layer].entities++;
  }
  
  // Count clouds
  for (const cloud of effectSystem.getAllEffects()) {
    layerStats[cloud.layer].clouds++;
  }
  
  const LAYER_COLORS = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
  
  layerList.innerHTML = '';
  for (let i = CONFIG.layerCount - 1; i >= 0; i--) {
    const stats = layerManager.getLayerStats(i);
    const div = document.createElement('div');
    div.className = 'layer-item';
    div.style.borderLeft = i === CONFIG.layerCount - 1 ? '3px solid #4a90d9' : '3px solid transparent';
    div.innerHTML = `
      <div style="display:flex;align-items:center;">
        <div class="layer-color" style="background:${LAYER_COLORS[i]};opacity:${stats.alpha}"></div>
        <span>Layer ${i} ${i === CONFIG.layerCount - 1 ? '(前景)' : i === 0 ? '(背景)' : ''}</span>
      </div>
      <div style="text-align:right;">
        <div>${layerStats[i].tiles} tiles | ${layerStats[i].entities} entities${layerStats[i].clouds ? ` | ☁️ ${layerStats[i].clouds} clouds` : ''}</div>
        <div style="font-size:0.75em;color:#888;">
          ${(stats.parallax * 100).toFixed(0)}% parallax | ${(stats.alpha * 100).toFixed(0)}% alpha | Z+${stats.zIndexOffset}
        </div>
      </div>
    `;
    layerList.appendChild(div);
  }
}

// ==================== Helper ====================
function log(msg, type = '') {
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-msg log-${type}`;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.children.length > 20) logEl.removeChild(logEl.firstChild);
}
