<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axial2.5D - Framework Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
    #container { display: flex; height: 100vh; }
    #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    canvas { border: 2px solid #4a4a6a; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #sidebar { width: 280px; background: rgba(0,0,0,0.3); padding: 15px; overflow-y: auto; border-left: 1px solid #4a4a6a; }
    h1 { font-size: 1.4em; margin-bottom: 10px; color: #4a90d9; }
    h2 { font-size: 1em; margin: 15px 0 8px; color: #6a8caf; border-bottom: 1px solid #4a4a6a; padding-bottom: 5px; }
    .stat { margin: 5px 0; font-size: 0.85em; color: #aaa; }
    .stat span { color: #fff; }
    button { width: 100%; padding: 8px; margin: 4px 0; background: #4a4a6a; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
    button:hover { background: #5a5a7a; }
    button.active { background: #4a90d9; }
    .key { display: inline-block; background: #333; padding: 2px 5px; border-radius: 3px; font-size: 0.75em; margin: 1px; }
    #log { background: rgba(0,0,0,0.3); border: 1px solid #4a4a6a; border-radius: 4px; padding: 8px; height: 100px; overflow-y: auto; font-family: monospace; font-size: 0.75em; }
    .log-msg { margin: 2px 0; color: #888; }
    .log-info { color: #4a90d9; }
    .log-success { color: #4ad97a; }
    .layer-item { display: flex; justify-content: space-between; align-items: center; padding: 4px; margin: 2px 0; background: rgba(255,255,255,0.05); border-radius: 3px; font-size: 0.8em; }
    .layer-color { width: 12px; height: 12px; border-radius: 2px; margin-right: 8px; }
  </style>
</head>
<body>
<div id="container">
  <div id="canvas-container"><canvas id="gameCanvas" width="800" height="600"></canvas></div>
  <div id="sidebar">
    <h1>🎮 Axial2.5D Framework</h1>
    <h2>📊 Status</h2>
    <div class="stat">FPS: <span id="fps">0</span></div>
    <div class="stat">Layers: <span id="layerCount">0</span></div>
    <div class="stat">Player: <span id="playerPos">0, 0</span></div>
    <h2>🎯 Controls</h2>
    <div class="stat"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div>
    <div class="stat"><span class="key">Click</span> Move to tile</div>
    <div class="stat"><span class="key">Drag</span> Pan camera</div>
    <div class="stat"><span class="key">Wheel</span> Zoom</div>
    <h2>⚙️ Settings</h2>
    <button id="btnGrid" onclick="toggleGrid()">📐 Grid</button>
    <button id="btnDebug" onclick="toggleDebug()">🐛 Debug</button>
    <button onclick="resetCamera()">📷 Reset Camera</button>
    <button onclick="regenerateClouds()">☁️ Regenerate Clouds</button>
    <div style="margin-top:10px;">
      <label style="font-size:0.8em;color:#888;">前景透明度：<span id="fgAlphaVal">0.6</span></label>
      <input type="range" min="0.2" max="1.0" step="0.1" value="0.6" style="width:100%;" oninput="setForegroundAlpha(this.value)">
    </div>
    <div style="margin-top:8px;">
      <label style="font-size:0.8em;color:#888;">Z 轴间距：<span id="zStepVal">30</span></label>
      <input type="range" min="0" max="100" step="10" value="30" style="width:100%;" oninput="setZIndexStep(this.value)">
    </div>
    <div style="margin-top:8px;">
      <label style="font-size:0.8em;color:#888;">视差范围：<span id="parallaxRangeVal">0.7</span></label>
      <input type="range" min="0" max="1.0" step="0.1" value="0.7" style="width:100%;" oninput="setParallaxRange(this.value)">
    </div>
    <h2>📊 Layers</h2>
    <div id="layerList"></div>
    <h2>📜 Log</h2>
    <div id="log"></div>
  </div>
</div>

<script type="module">
import { Game, gridToWorld, worldToGrid } from '../../src/index.ts';

// ==================== Game Configuration ====================
const CONFIG = {
  width: 800,
  height: 600,
  mapSize: 12,
  cellSize: 50,
  layerCount: 5
};

// ==================== Game State ====================
const state = {
  showGrid: true,
  showDebug: false,
  player: { col: 6, row: 6 },
  camera: { zoom: 1 },
  layerSettings: {
    foregroundAlpha: 0.6,
    zIndexStep: 30,
    parallaxRange: 0.7
  },
  clouds: [],
  lastTime: 0,
  frameCount: 0,
  fps: 0
};

// ==================== Initialize Game ====================
const canvas = document.getElementById('gameCanvas');

const game = new Game({
  width: CONFIG.width,
  height: CONFIG.height,
  canvas: canvas,
  projection: { type: 'isometric', viewAngle: 45 },
  debug: { enabled: false }
});

// Initialize with map data
game.init({
  width: CONFIG.mapSize,
  height: CONFIG.mapSize,
  tileW: CONFIG.cellSize,
  tileH: CONFIG.cellSize,
  tiles: []
});

// Setup map tiles
setupMapTiles();

// Add player entity
game.entityManager.addEntity({
  id: 'player',
  col: state.player.col,
  row: state.player.row,
  width: 50,
  length: 50,
  height: 70,
  depth: 0,
  visible: true
});

// Create clouds
regenerateClouds();

// ==================== Map Setup ====================
function setupMapTiles() {
  const { mapSize } = CONFIG;
  
  for (let c = 0; c < mapSize; c++) {
    for (let r = 0; r < mapSize; r++) {
      let type = 'grass', walkable = true;
      
      // Borders = water
      if (c === 0 || c === mapSize-1 || r === 0 || r === mapSize-1) {
        type = 'water';
        walkable = false;
      }
      // Center cross = road
      if (c === 6 || r === 6) type = 'road';
      // Checker pattern = stone
      if ((c+r) % 4 === 0 && c > 1 && c < mapSize-2 && r > 1 && r < mapSize-2) {
        type = 'stone';
      }
      
      game.gridSystem.setTileType(c, r, type, walkable);
    }
  }
}

// ==================== Cloud System ====================
function regenerateClouds() {
  state.clouds = [];
  const cloudCount = 6 + Math.floor(Math.random() * 5);
  
  for (let i = 0; i < cloudCount; i++) {
    state.clouds.push({
      col: Math.floor(Math.random() * (CONFIG.mapSize - 2)) + 1,
      row: Math.floor(Math.random() * (CONFIG.mapSize - 2)) + 1,
      size: 40 + Math.random() * 40,
      offsetY: -50 - Math.random() * 100
    });
  }
  
  log(`☁️ Regenerated ${state.clouds.length} clouds`, 'success');
}

// ==================== Game Loop ====================
function gameLoop(timestamp) {
  const delta = timestamp - state.lastTime;
  state.lastTime = timestamp;
  state.frameCount++;
  
  if (delta >= 1000) {
    state.fps = state.frameCount;
    state.frameCount = 0;
  }
  
  // Update
  update();
  
  // Render using framework's layer system
  render();
  
  // Update UI
  updateUI();
  
  requestAnimationFrame(gameLoop);
}

function update() {
  // Update entities
  if (game.entityManager) {
    game.entityManager.updateAll(16);
  }
  
  // Smooth camera follow player
  updateCamera();
  
  // Update debug stats
  if (game.debugSystem) {
    game.debugSystem.updateFrameStats(16);
  }
}

function updateCamera() {
  const worldPos = game.gridSystem.gridToWorld(state.player.col, state.player.row);
  game.renderer.camera.setPosition(worldPos.x, worldPos.z, game.projection);
}

function render() {
  // Use framework's built-in layer rendering
  game.renderDefault({
    layerCount: CONFIG.layerCount,
    showGrid: state.showGrid,
    foregroundAlpha: state.layerSettings.foregroundAlpha,
    zIndexStep: state.layerSettings.zIndexStep,
    parallaxRange: state.layerSettings.parallaxRange
  });
  
  // Draw clouds on top (Layer 4 - foreground)
  drawClouds();
  
  // Draw debug info
  if (state.showDebug) {
    drawDebug();
  }
}

function drawClouds() {
  const ctx = canvas.getContext('2d');
  const { layerCount } = CONFIG;
  const layerIdx = layerCount - 1; // Foreground layer
  
  const parallaxFactor = 0.3 + (layerIdx / (layerCount - 1)) * state.layerSettings.parallaxRange;
  const alpha = 1.0 - (1.0 - state.layerSettings.foregroundAlpha) * (layerIdx / (layerCount - 1));
  const zIndexOffset = layerIdx * state.layerSettings.zIndexStep;
  
  ctx.save();
  ctx.globalAlpha = alpha * 0.9;
  
  if (zIndexOffset !== 0) {
    ctx.translate(0, -zIndexOffset);
  }
  
  for (const cloud of state.clouds) {
    const worldPos = gridToWorld(cloud.col, cloud.row, CONFIG.cellSize);
    const screen = game.renderer.camera.worldToScreen(
      worldPos.x,
      worldPos.z,
      cloud.offsetY,
      game.projection,
      parallaxFactor
    );
    
    const size = cloud.size;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(screen.sx, screen.sy, size * 0.5, 0, Math.PI * 2);
    ctx.arc(screen.sx - size * 0.4, screen.sy + size * 0.1, size * 0.4, 0, Math.PI * 2);
    ctx.arc(screen.sx + size * 0.4, screen.sy + size * 0.1, size * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawDebug() {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f0';
  ctx.font = '12px monospace';
  let y = 20, lineH = 16;
  
  ctx.fillText(`FPS: ${state.fps}`, 10, y); y += lineH;
  ctx.fillText(`Layers: ${CONFIG.layerCount}`, 10, y); y += lineH;
  ctx.fillText(`Player: (${state.player.col}, ${state.player.row})`, 10, y); y += lineH;
  ctx.fillText(`Camera: (${game.renderer.camera.offsetX.toFixed(0)}, ${game.renderer.camera.offsetY.toFixed(0)})`, 10, y); y += lineH;
  ctx.fillText(`Zoom: ${state.camera.zoom.toFixed(2)}`, 10, y); y += lineH;
  ctx.fillText(`Parallax Range: ${state.layerSettings.parallaxRange}`, 10, y);
}

function updateUI() {
  document.getElementById('fps').textContent = state.fps;
  document.getElementById('layerCount').textContent = CONFIG.layerCount;
  document.getElementById('playerPos').textContent = `${state.player.col}, ${state.player.row}`;
  updateLayerList();
}

function updateLayerList() {
  const layerList = document.getElementById('layerList');
  if (!layerList) return;
  
  const { layerCount } = CONFIG;
  const mapSize = CONFIG.mapSize;
  
  layerList.innerHTML = '';
  for (let i = layerCount - 1; i >= 0; i--) {
    const parallax = 0.3 + (i / (layerCount - 1)) * state.layerSettings.parallaxRange;
    const alpha = 1.0 - (1.0 - state.layerSettings.foregroundAlpha) * (i / (layerCount - 1));
    const zOffset = i * state.layerSettings.zIndexStep;
    
    // Count tiles per layer
    let tileCount = 0;
    for (let c = 0; c < mapSize; c++) {
      for (let r = 0; r < mapSize; r++) {
        const depth = c + r;
        const layerIdx = Math.floor((depth / 2000) * layerCount);
        if (layerIdx === i) tileCount++;
      }
    }
    
    const div = document.createElement('div');
    div.className = 'layer-item';
    div.style.borderLeft = i === layerCount - 1 ? '3px solid #4a90d9' : '3px solid transparent';
    div.innerHTML = `
      <div style="display:flex;align-items:center;">
        <div class="layer-color" style="background:#${i.toString(16).padStart(2, '0')}ff${i.toString(16).padStart(2, '0')}"></div>
        <span>Layer ${i} ${i === layerCount - 1 ? '(前景)' : i === 0 ? '(背景)' : ''}</span>
      </div>
      <div style="text-align:right;">
        <div>${tileCount} tiles</div>
        <div style="font-size:0.75em;color:#888;">
          ${(parallax * 100).toFixed(0)}% parallax | ${(alpha * 100).toFixed(0)}% alpha | Z+${zOffset}
        </div>
      </div>
    `;
    layerList.appendChild(div);
  }
}

// ==================== Input Handling ====================
// Setup input handlers via event bus
game.eventBus.on('dragMove', (data) => {
  game.renderer.camera.pan(-data.deltaX, -data.deltaY);
});

game.eventBus.on('zoom', (data) => {
  state.camera.zoom *= data.delta;
  state.camera.zoom = Math.max(0.5, Math.min(3, state.camera.zoom));
  game.renderer.camera.setZoom(state.camera.zoom);
});

game.eventBus.on('click', (data) => {
  if (data.worldX === undefined || data.worldZ === undefined) return;
  
  const gridPos = game.gridSystem.worldToGrid(data.worldX, data.worldZ);
  const tile = game.gridSystem.getTile(gridPos.col, gridPos.row);
  
  if (tile && tile.walkable) {
    state.player.col = gridPos.col;
    state.player.row = gridPos.row;
    
    // Move player entity
    const player = game.entityManager.getEntity('player');
    if (player) {
      game.entityManager.moveEntity(player, gridPos.col, gridPos.row);
    }
    
    log(`Moved to (${gridPos.col}, ${gridPos.row})`, 'info');
  }
});

// Keyboard controls
document.addEventListener('keydown', e => {
  let { col, row } = state.player;
  if (e.key === 'w' || e.key === 'ArrowUp') row--;
  if (e.key === 's' || e.key === 'ArrowDown') row++;
  if (e.key === 'a' || e.key === 'ArrowLeft') col--;
  if (e.key === 'd' || e.key === 'ArrowRight') col++;
  
  const tile = game.gridSystem.getTile(col, row);
  if (tile && tile.walkable) {
    state.player.col = col;
    state.player.row = row;
    
    const player = game.entityManager.getEntity('player');
    if (player) {
      game.entityManager.moveEntity(player, col, row);
    }
    
    log(`Moved to (${col}, ${row})`, 'info');
  }
});

// ==================== UI Functions ====================
window.toggleGrid = () => {
  state.showGrid = !state.showGrid;
  document.getElementById('btnGrid').classList.toggle('active', state.showGrid);
};

window.toggleDebug = () => {
  state.showDebug = !state.showDebug;
  document.getElementById('btnDebug').classList.toggle('active', state.showDebug);
  game.debugSystem.enabled = state.showDebug;
};

window.resetCamera = () => {
  state.camera.zoom = 1;
  game.renderer.camera.setZoom(1);
  game.renderer.camera.reset();
  updateCamera();
  log('Camera reset', 'info');
};

window.setForegroundAlpha = (value) => {
  state.layerSettings.foregroundAlpha = parseFloat(value);
  document.getElementById('fgAlphaVal').textContent = value;
};

window.setZIndexStep = (value) => {
  state.layerSettings.zIndexStep = parseInt(value);
  document.getElementById('zStepVal').textContent = value;
};

window.setParallaxRange = (value) => {
  state.layerSettings.parallaxRange = parseFloat(value);
  document.getElementById('parallaxRangeVal').textContent = value;
};

window.regenerateClouds = regenerateClouds;

function log(msg, type = '') {
  const logEl = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-msg log-${type}`;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.children.length > 20) logEl.removeChild(logEl.firstChild);
}

// ==================== Start Game ====================
log('🎮 Axial2.5D Framework Example started!', 'success');
log(`Map: ${CONFIG.mapSize}x${CONFIG.mapSize}, ${CONFIG.layerCount} layers`, 'info');
game.start();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
