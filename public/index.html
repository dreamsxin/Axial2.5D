<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axial2.5D Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
      overflow: hidden;
    }
    #container { display: flex; height: 100vh; }
    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    canvas {
      border: 2px solid #4a4a6a;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
    #sidebar {
      width: 280px;
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      overflow-y: auto;
      border-left: 1px solid #4a4a6a;
    }
    h1 { font-size: 1.5em; margin-bottom: 10px; color: #4a90d9; }
    h2 { font-size: 1.1em; margin: 20px 0 10px; color: #6a8caf; border-bottom: 1px solid #4a4a6a; padding-bottom: 5px; }
    .info-item { margin: 8px 0; font-size: 0.9em; color: #aaa; }
    .info-item span { color: #fff; }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #4a4a6a;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5a5a7a; }
    button.active { background: #4a90d9; }
    .key-hint {
      display: inline-block;
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.8em;
      margin: 2px;
    }
    #log {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #4a4a6a;
      border-radius: 4px;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8em;
    }
    .log-entry { margin: 3px 0; color: #888; }
    .log-entry.info { color: #4a90d9; }
    .log-entry.success { color: #4ad97a; }
  </style>
</head>
<body>
  <div id="container">
    <div id="canvas-container">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="sidebar">
      <h1>🎮 Axial2.5D</h1>
      <p style="color: #666; font-size: 0.85em; margin-bottom: 15px;">Isometric Game Framework Demo</p>
      <h2>📊 状态 Status</h2>
      <div class="info-item">FPS: <span id="fps-display">0</span></div>
      <div class="info-item">Entities: <span id="entity-count">0</span></div>
      <div class="info-item">Player: <span id="player-pos">0, 0</span></div>
      <h2>🎯 控制 Controls</h2>
      <div class="info-item"><span class="key-hint">W</span><span class="key-hint">A</span><span class="key-hint">S</span><span class="key-hint">D</span> 移动 Move</div>
      <div class="info-item"><span class="key-hint">Click</span> 点击移动 Click to move</div>
      <div class="info-item"><span class="key-hint">Drag</span> 拖动相机 Drag camera</div>
      <div class="info-item"><span class="key-hint">Wheel</span> 缩放 Zoom</div>
      <h2>⚙️ 设置 Settings</h2>
      <div class="control-group">
        <button id="btn-grid" onclick="toggleGrid()">📐 网格 Grid</button>
        <button id="btn-wireframe" onclick="toggleWireframe()">🔲 线框 Wireframe</button>
        <button id="btn-debug" onclick="toggleDebug()">🐛 调试 Debug</button>
        <button onclick="resetCamera()">📷 重置相机 Reset</button>
        <button onclick="teleportPlayer()">🚀 随机传送 Teleport</button>
      </div>
      <h2>📜 日志 Log</h2>
      <div id="log"></div>
    </div>
  </div>
  <script src="axial25d.bundle.js"></script>
  <script src="web-demo.js"></script>
</body>
</html>
